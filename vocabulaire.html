<!DOCTYPE html>
<html lang="fr" data-theme="clair">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vocabulaire fréquent · Arabe coranique</title>
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/composants.css">
  <link rel="stylesheet" href="css/theme-sombre.css">
</head>
<body>
  <div id="barre"></div>
  <main class="contenu">
    <header class="centre">
      <p class="cycle-romain">80% des mots du Coran</p>
      <h1>Vocabulaire fréquent</h1>
      <p class="muet" style="max-width:560px;margin:0.4rem auto 0;">
        Les mots qui reviennent le plus souvent dans le Coran. Apprenez-les
        dès maintenant, sans attendre : reconnaître ces mots éclaire aussitôt
        un grand nombre de versets. Touchez une carte pour la retourner et
        l'entendre.
      </p>
    </header>
    <hr class="filet">
    <section id="groupes"></section>
  </main>

  <script src="js/repetition.js"></script>
  <script src="js/stockage.js"></script>
  <script src="js/speech.js"></script>
  <script src="js/app.js"></script>
  <script src="donnees/frequent.js"></script>
  <script>
    App.init('vocabulaire');
    const racine = document.getElementById('groupes');

    Frequent.groupes.forEach((groupe, gi) => {
      const sec = document.createElement('section');
      sec.className = 'section-lecon';
      sec.innerHTML = `<div class="titre-section">${groupe.titre}</div>`;
      if (groupe.intro) {
        const p = document.createElement('p'); p.className = 'muet petit'; p.textContent = groupe.intro;
        sec.appendChild(p);
      }
      const grille = document.createElement('div');
      grille.className = 'grille-cartes';

      groupe.mots.forEach((mot) => {
        const carte = document.createElement('button');
        carte.type = 'button';
        carte.className = 'carte-mot';
        carte.innerHTML = `
          <span class="cm-ar">${mot.ar}</span>
          <span class="cm-dos">
            <span class="translit">${mot.tr}</span>
            <span class="cm-fr">${mot.fr}</span>
            ${mot.note ? `<span class="cm-note">${mot.note}</span>` : ''}
          </span>`;
        carte.addEventListener('click', () => {
          carte.classList.toggle('retournee');
          Parole.prononcer(mot.ar, { rate: 0.8 });
          // Première découverte : on l'enregistre comme « vu »
          Stockage.enregistrerMot(mot.cle, true);
        });
        grille.appendChild(carte);
      });
      sec.appendChild(grille);

      // Bouton : programmer la révision de ce thème
      const wrap = document.createElement('div'); wrap.style.marginTop = '0.9rem';
      const b = document.createElement('button'); b.className = 'btn btn-secondaire btn-petit';
      b.type = 'button'; b.textContent = 'Programmer la révision de ce thème';
      b.addEventListener('click', () => {
        groupe.mots.forEach((m) => Stockage.enregistrerMot(m.cle, false));
        b.textContent = 'Ajouté à la salle de révision';
        b.disabled = true;
      });
      wrap.appendChild(b);
      sec.appendChild(wrap);
      racine.appendChild(sec);
    });
  </script>
  <!-- Synchronisation de la progression (Firebase, si connecté) -->
  <script src="js/firebase-config.js"></script>
  <script type="module" src="js/sync.js"></script>
  <script src="js/fond-parallax.js"></script>
</body>
</html>
