<!DOCTYPE html>
<html lang="fr" data-theme="clair">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Salle de révision · Arabe coranique</title>
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/composants.css">
  <link rel="stylesheet" href="css/theme-sombre.css">
</head>
<body>
  <div id="barre"></div>
  <main class="contenu">
    <header class="centre">
      <p class="cycle-romain">Répétition espacée</p>
      <h1>Salle de révision</h1>
      <p class="muet" style="max-width:520px;margin:0.4rem auto 0;">
        Les mots rencontrés reviennent ici au bon moment, à un jour, trois jours,
        puis une semaine d'écart, pour s'ancrer sans effort.
      </p>
    </header>

    <hr class="filet">
    <section id="zone-revision"></section>
  </main>

  <script src="js/repetition.js"></script>
  <script src="js/stockage.js"></script>
  <script src="js/speech.js"></script>
  <script src="js/exercices.js"></script>
  <script src="js/clavier-arabe.js"></script>
  <script src="js/app.js"></script>
  <script src="donnees/versets.js"></script>
  <script src="donnees/lecons.js"></script>
  <script src="donnees/frequent.js"></script>
  <script src="donnees/vocabulaire.js"></script>
  <script>
    App.init('revision');
    const zone = document.getElementById('zone-revision');
    const lexique = Vocabulaire.indexParCle();

    // Index des phrases clefs (à partir du champ memoriser de chaque leçon).
    const phrasesIndex = {};
    Object.keys(Lecons).forEach((id) => {
      const m = Lecons[id].memoriser;
      if (m) phrasesIndex[m.cle || ('phrase-' + id)] = m;
    });

    function melange(a) { a = a.slice(); for (let k = a.length - 1; k > 0; k--) { const j = Math.floor(Math.random() * (k + 1)); [a[k], a[j]] = [a[j], a[k]]; } return a; }

    // Éléments arrivés à échéance (répétition espacée)
    const dus = Repetition.motsADue(Stockage.etat.revisions)
      .filter((cle) => lexique[cle])
      .map((cle) => ({ cle, type: 'mot', ...lexique[cle] }));
    Stockage.phrasesADue().forEach((cle) => {
      if (phrasesIndex[cle]) dus.push({ cle, type: 'phrase', ...phrasesIndex[cle] });
    });

    // Tout ce que l'on peut réviser : mots déjà rencontrés (sinon tout le
    // vocabulaire fréquent, pour qu'un nouvel arrivant puisse réviser aussi),
    // plus les phrases inscrites.
    const rencontres = Object.keys(Stockage.etat.vocabulaire).filter((c) => lexique[c]);
    const baseMots = (rencontres.length ? rencontres : Object.keys(lexique));
    const tous = baseMots.map((cle) => ({ cle, type: 'mot', ...lexique[cle] }));
    Object.keys(Stockage.etat.phrases).forEach((cle) => {
      if (phrasesIndex[cle]) tous.push({ cle, type: 'phrase', ...phrasesIndex[cle] });
    });

    // Menu de révision : on peut toujours réviser quelque chose.
    const menu = document.createElement('div');
    menu.className = 'carte centre';
    let html = '';
    if (dus.length) {
      html += `<h3>${dus.length} élément${dus.length > 1 ? 's' : ''} à revoir aujourd'hui</h3>
        <p class="muet petit">La répétition espacée les a ramenés au bon moment.</p>
        <button class="btn" id="btn-dus">Commencer ma révision du jour</button>`;
    } else {
      html += `<h3>Vous êtes à jour</h3>
        <p class="muet petit">Aucun mot n'est arrivé à échéance pour aujourd'hui.
        Vous pouvez tout de même réviser librement, autant que vous voulez.</p>`;
    }
    html += `<div style="margin-top:1rem"><button class="btn ${dus.length ? 'btn-secondaire' : ''}" id="btn-tous">Réviser librement (${tous.length} mot${tous.length > 1 ? 's' : ''})</button></div>`;
    menu.innerHTML = html;
    zone.appendChild(menu);

    if (dus.length) document.getElementById('btn-dus').onclick = () => { zone.innerHTML = ''; lancerSession(dus); };
    document.getElementById('btn-tous').onclick = () => {
      zone.innerHTML = '';
      lancerSession(melange(tous).slice(0, 20)); // séance courte de 20 cartes
    };

    function lancerSession(items) {
      let i = 0, reussis = 0;
      const carte = document.createElement('div');
      carte.className = 'carte';
      zone.appendChild(carte);
      const progres = document.createElement('p');
      progres.className = 'muet petit centre';
      zone.insertBefore(progres, carte);

      function montrer() {
        if (i >= items.length) return terminer();
        progres.textContent = 'Carte ' + (i + 1) + ' sur ' + items.length;
        const mot = items[i];
        carte.innerHTML = '';
        const flash = document.createElement('div'); flash.className = 'carte-flash';
        flash.innerHTML = `<div class="ar">${mot.ar}</div>
          <p class="muet petit">${mot.type === 'phrase' ? 'Vous souvenez vous de cette phrase et de son sens ?' : 'Vous souvenez vous du sens de ce mot ?'}</p>
          <div class="reponse"><p class="translit">${mot.tr}</p><p style="font-size:1.2rem">${mot.fr}</p></div>`;
        carte.appendChild(flash);

        const reponse = flash.querySelector('.reponse');
        const actions = document.createElement('div');
        actions.style.cssText = 'display:flex;gap:0.8rem;justify-content:center;margin-top:1rem;flex-wrap:wrap;';
        const btnVoir = document.createElement('button');
        btnVoir.className = 'btn btn-secondaire'; btnVoir.textContent = 'Afficher la réponse';
        btnVoir.onclick = () => {
          reponse.classList.add('visible');
          Parole.prononcer(mot.ar, { rate: mot.type === 'phrase' ? 0.7 : 0.8 });
          actions.innerHTML = '';
          const ko = document.createElement('button');
          ko.className = 'btn btn-secondaire'; ko.textContent = 'À revoir';
          ko.onclick = () => juger(false);
          const ok = document.createElement('button');
          ok.className = 'btn'; ok.textContent = 'Je le savais';
          ok.onclick = () => juger(true);
          actions.appendChild(ko); actions.appendChild(ok);
        };
        actions.appendChild(btnVoir);
        carte.appendChild(actions);
      }

      function juger(reussi) {
        const it = items[i];
        if (it.type === 'phrase') Stockage.enregistrerPhrase(it.cle, reussi);
        else Stockage.enregistrerMot(it.cle, reussi);
        if (reussi) reussis++;
        i++;
        montrer();
      }

      function terminer() {
        progres.textContent = '';
        carte.innerHTML = `<div class="carte-flash">
          <h3>Révision terminée</h3>
          <p class="muet">Vous avez revu ${items.length} élément${items.length>1?'s':''},
          dont ${reussis} retrouvé${reussis>1?'s':''} de mémoire.</p>
          <p class="muet petit">Les mots hésitants reviendront bientôt, les autres s'espaceront.</p>
          <div style="display:flex;gap:0.8rem;justify-content:center;flex-wrap:wrap;margin-top:0.5rem">
            <button class="btn" onclick="location.reload()">Réviser encore</button>
            <a class="btn btn-secondaire" href="index.html">Accueil</a>
          </div></div>`;
        Stockage.marquerPratiqueDuJour();
        Stockage.sauver();
      }

      montrer();
    }
  </script>
</body>
</html>
