<!DOCTYPE html>
<html lang="fr" data-theme="clair">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Entraînement · Institut Naqshbandi</title>
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/composants.css">
  <link rel="stylesheet" href="css/theme-sombre.css">
</head>
<body>
  <div id="barre"></div>
  <main class="contenu">
    <header class="centre">
      <p class="cycle-romain">Réviser tout son vocabulaire</p>
      <h1>Entraînement</h1>
      <p class="muet" style="max-width:560px;margin:0.4rem auto 0;">
        Des questions tirées de tout votre vocabulaire, pour entretenir vos
        acquis et gagner des points. Chaque bonne réponse vous fait progresser.
      </p>
    </header>
    <hr class="filet">
    <section id="jeu"></section>
  </main>

  <script src="js/repetition.js"></script>
  <script src="js/stockage.js"></script>
  <script src="js/speech.js"></script>
  <script src="js/exercices.js"></script>
  <script src="js/app.js"></script>
  <script src="donnees/versets.js"></script>
  <script src="donnees/lecons.js"></script>
  <script src="donnees/frequent.js"></script>
  <script src="donnees/vocabulaire.js"></script>
  <script>
    App.init('entrainement');
    App.verifierAudio();
    const zone = document.getElementById('jeu');
    const N = 12; // questions par partie

    // Réserve de mots : tout le vocabulaire connu (leçons + fréquent).
    const pool = Vocabulaire.tous().filter((m) => m.ar && m.tr && m.fr);

    function melanger(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
    function autres(mot, champ, n){
      const vus=new Set([mot[champ]]); const res=[];
      for(const m of melanger(pool)){ if(res.length>=n) break; if(!vus.has(m[champ])){vus.add(m[champ]); res.push(m);} }
      return res;
    }

    // Construit une question (objet exercice) à partir d'un mot.
    function genererQuestion(){
      const mot = pool[Math.floor(Math.random()*pool.length)];
      const t = ['sens','arabe','phon'][Math.floor(Math.random()*3)];
      if (t==='sens'){
        const d = autres(mot,'fr',3);
        const opts = melanger([{texte:mot.fr,ok:true}, ...d.map(x=>({texte:x.fr}))]);
        return { type:'qcm', consigne:'Que signifie ce mot ?', enonceAr:mot.ar,
          options:opts.map(o=>({texte:o.texte})), bonne:opts.findIndex(o=>o.ok), cles:[mot.cle] };
      }
      if (t==='arabe'){
        const d = autres(mot,'ar',3);
        const opts = melanger([{ar:mot.ar,ok:true}, ...d.map(x=>({ar:x.ar}))]);
        return { type:'qcm', consigne:'Quel mot correspond à : « '+mot.fr+' » ?',
          options:opts.map(o=>({ar:o.ar})), bonne:opts.findIndex(o=>o.ok), cles:[mot.cle] };
      }
      const d = autres(mot,'tr',2);
      const opts = melanger([{tr:mot.tr,ok:true}, ...d.map(x=>({tr:x.tr}))]);
      return { type:'phonetique', consigne:'Lisez ce mot et choisissez sa transcription.',
        motAr:mot.ar, options:opts.map(o=>o.tr), bonne:opts.findIndex(o=>o.ok), cles:[mot.cle] };
    }

    let i=0, points=0, serie=0, meilleureSerie=0;

    // Bandeau de score
    const tete = document.createElement('div'); tete.className='jeu-tete';
    const nv = Stockage.niveau();
    tete.innerHTML = `
      <div class="jeu-score"><span class="jeu-pts" id="pts">0</span> points</div>
      <div class="jeu-progres"><span id="jeu-barre" style="width:0"></span></div>
      <div class="jeu-niveau">Niveau ${nv.niveau}</div>`;
    zone.appendChild(tete);
    const qZone = document.createElement('div'); zone.appendChild(qZone);

    function poser(){
      if (i>=N) return terminer();
      document.getElementById('jeu-barre').style.width = Math.round((i/N)*100)+'%';
      qZone.innerHTML='';
      const exo = genererQuestion();
      let repondu=false;
      Exercices.rendre(exo, i, qZone, (reussi)=>{
        if (repondu) return; repondu=true;
        if (reussi){ serie++; meilleureSerie=Math.max(meilleureSerie,serie);
          const bonus = Math.min((serie-1)*2, 10);
          const gagne = 10 + bonus; points += gagne;
          document.getElementById('pts').textContent = points;
          annonce('+'+gagne+(bonus?' (série '+serie+')':''), true);
        } else { serie=0; annonce('Réponse notée', false); }
        const suite = document.createElement('button');
        suite.className='btn btn-bloc'; suite.style.marginTop='1rem';
        suite.textContent = (i===N-1)?'Voir mon score':'Question suivante';
        suite.onclick = ()=>{ i++; poser(); };
        qZone.appendChild(suite);
        suite.focus();
      }, 6);
    }

    function annonce(txt, bon){
      const a=document.createElement('div');
      a.className='jeu-annonce '+(bon?'bon':'neutre'); a.textContent=txt;
      qZone.appendChild(a);
    }

    function terminer(){
      document.getElementById('jeu-barre').style.width='100%';
      const avant = Stockage.niveau().niveau;
      const apres = Stockage.ajouterPartie(points, meilleureSerie);
      const monteNiveau = apres.niveau > avant;
      qZone.innerHTML = `<div class="carte centre apparait">
        <h2>Partie terminée</h2>
        <p class="jeu-bilan-pts">+${points} points</p>
        <p class="muet">Meilleure série : ${meilleureSerie} bonnes réponses d'affilée.</p>
        ${monteNiveau?`<p style="color:var(--accent);font-weight:600">Vous passez au niveau ${apres.niveau} !</p>`:`<p class="muet petit">Niveau ${apres.niveau} · ${apres.dansNiveau}/${apres.pourNiveau} points vers le suivant</p>`}
        <div class="jeu-progres" style="max-width:280px;margin:1rem auto"><span style="width:${Math.round(apres.dansNiveau/apres.pourNiveau*100)}%"></span></div>
        <div style="display:flex;gap:0.8rem;justify-content:center;flex-wrap:wrap;margin-top:1rem">
          <button class="btn" onclick="location.reload()">Rejouer</button>
          <a class="btn btn-secondaire" href="index.html">Accueil</a>
        </div>
      </div>`;
    }

    if (pool.length < 6){
      zone.innerHTML = `<div class="carte centre"><h3>Pas encore assez de vocabulaire</h3>
        <p class="muet">Découvrez quelques mots dans les leçons ou la page Vocabulaire, puis revenez vous entraîner.</p>
        <a class="btn" href="vocabulaire.html">Voir le vocabulaire fréquent</a></div>`;
    } else {
      poser();
    }
  </script>
</body>
</html>
