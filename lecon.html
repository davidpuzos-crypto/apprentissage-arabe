<!DOCTYPE html>
<html lang="fr" data-theme="clair">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Leçon · Arabe coranique</title>
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/composants.css">
  <link rel="stylesheet" href="css/theme-sombre.css">
</head>
<body>
  <div id="barre"></div>
  <main class="contenu" id="lecon"></main>

  <script src="js/repetition.js"></script>
  <script src="js/stockage.js"></script>
  <script src="js/speech.js"></script>
  <script src="js/clavier-arabe.js"></script>
  <script src="js/exercices.js"></script>
  <script src="js/jeu.js"></script>
  <script src="js/app.js"></script>
  <script src="donnees/versets.js"></script>
  <script src="donnees/lecons.js"></script>
  <script src="donnees/vocabulaire.js"></script>
  <script>
    App.init(null);
    App.verifierAudio();
    let id = parseInt(App.param('id'), 10);
    if (!Number.isInteger(id) || id < 0 || id > 30) id = 1; // 0 = introduction
    const racine = document.getElementById('lecon');

    if (!Stockage.leconAccessible(id)) {
      racine.innerHTML = `<div class="centre" style="margin-top:3rem;">
        <h2>Cette leçon n'est pas encore ouverte</h2>
        <p class="muet">Terminez la leçon précédente pour y accéder.</p>
        <a class="btn" href="lecon.html?id=${id-1}">Aller à la leçon ${App.romain(id-1)}</a></div>`;
      throw new Error('Leçon verrouillée');
    }

    const lecon = Lecons[id];
    if (!lecon) {
      racine.innerHTML = `<div class="centre" style="margin-top:3rem;">
        <h2>Leçon introuvable</h2><a class="btn" href="index.html">Retour à l'accueil</a></div>`;
      throw new Error('Leçon absente');
    }

    // Leçon d'introduction (id 0) : contenu consultable, sans exercices ni bilan.
    const estIntro = !lecon.exercices || lecon.exercices.length === 0;
    document.title = (estIntro ? '' : 'Leçon ' + id + ' · ') + lecon.titre;

    /* ---- Utilitaires de rendu ---- */
    function elt(html) { const d = document.createElement('div'); d.innerHTML = html.trim(); return d.firstElementChild; }
    function audioBtn(texte) {
      const b = document.createElement('button');
      b.className = 'btn-audio'; b.type = 'button'; b.innerHTML = '&#9834;';
      b.setAttribute('aria-label', 'Écouter');
      b.onclick = (e) => { e.stopPropagation(); Parole.prononcer(texte, { rate: Parole.rateSelonLecon(id) }); };
      return b;
    }
    function section(titre) {
      const s = document.createElement('section');
      s.className = 'section-lecon';
      if (titre) s.appendChild(elt(`<div class="titre-section">${titre}</div>`));
      return s;
    }

    /* ===== Structure en parcours : Cours → Exercices → Bilan ===== */
    const tete = document.createElement('div'); tete.className = 'lecon-tete';
    tete.innerHTML = `
      <p class="cycle-romain">${estIntro ? 'Avant de commencer' : 'Cycle ' + App.romain(lecon.cycle) + ' &middot; Leçon ' + App.romain(id)}</p>
      <h1>${lecon.titre}</h1>
      <div class="lecon-onglets" role="tablist">
        <button class="onglet" data-vue="cours">Cours</button>
        ${estIntro ? '' : '<button class="onglet" data-vue="exo">Exercices</button><button class="onglet" data-vue="bilan">Bilan</button>'}
      </div>`;
    racine.appendChild(tete);

    const vueCours = document.createElement('div'); vueCours.className = 'vue';
    const vueExo = document.createElement('div'); vueExo.className = 'vue';
    const vueBilan = document.createElement('div'); vueBilan.className = 'vue';
    racine.appendChild(vueCours); racine.appendChild(vueExo); racine.appendChild(vueBilan);

    /* =========================================================================
       COURS EN DIAPOSITIVES — « une idée à la fois »
       Le cours est découpé en diapositives que l'on fait défiler. On allège
       ainsi la mémoire de travail : on lit une idée, on respire, on avance.
       Les explications, elles, restent généreuses (rien n'est sacrifié).
       ========================================================================= */
    const diapos = [];          // chaque entrée : { corps, surtitre }
    function nouvelleDiapo(surtitre, titre) {
      const corps = document.createElement('div'); corps.className = 'diapo-corps';
      if (surtitre) corps.appendChild(elt(`<p class="diapo-surtitre">${surtitre}</p>`));
      if (titre) corps.appendChild(elt(`<h2 class="diapo-titre">${titre}</h2>`));
      diapos.push({ corps, surtitre });
      return corps;
    }

    // Rend un bloc « lettres » (vitrine) dans un conteneur.
    function rendreLettres(bloc, cible) {
      const v = document.createElement('div'); v.className = 'vitrine-lettres';
      bloc.lettres.forEach((l) => {
        const tuile = document.createElement('div'); tuile.className = 'tuile-lettre';
        tuile.innerHTML = `<div class="gros">${l.ar}</div><div class="nom">${l.nom}</div><div class="son">${l.son}</div>`;
        tuile.onclick = () => Parole.prononcer(l.ar, { rate: Parole.rateSelonLecon(id) });
        v.appendChild(tuile);
      });
      cible.appendChild(v);
    }
    // Rend un bloc « lignes » (mot arabe + translittération + sens) .
    function rendreLignes(bloc, cible) {
      const tab = document.createElement('div');
      bloc.lignes.forEach((lg) => {
        const ligne = document.createElement('div'); ligne.className = 'ligne-decouverte';
        const ar = document.createElement('div'); ar.className = 'ar';
        ar.textContent = lg.ar; ar.appendChild(audioBtn(lg.ar));
        ar.style.cursor = 'pointer';
        ar.onclick = () => Parole.prononcer(lg.ar, { rate: Parole.rateSelonLecon(id) });
        const infos = document.createElement('div'); infos.className = 'infos';
        infos.innerHTML = (lg.tr ? App.phon(lg.tr) : '') + `<span class="fr">${lg.fr || ''}</span>` +
          (lg.note ? `<span class="note">${lg.note}</span>` : '');
        ligne.appendChild(ar); ligne.appendChild(infos);
        tab.appendChild(ligne);
      });
      cible.appendChild(tab);
    }
    // Rend un bloc « dialogue » (bulles).
    function rendreDialogue(bloc, cible) {
      if (bloc.titreDialogue) cible.appendChild(elt(`<p class="muet petit" style="margin-top:1rem">${bloc.titreDialogue}</p>`));
      const conv = document.createElement('div'); conv.className = 'dialogue';
      bloc.dialogue.forEach((tour) => {
        const b = document.createElement('div');
        b.className = 'bulle ' + (tour.qui === 'B' ? 'bulle-b' : 'bulle-a');
        const ar = document.createElement('div'); ar.className = 'bulle-ar';
        ar.textContent = tour.ar; ar.appendChild(audioBtn(tour.ar));
        ar.style.cursor = 'pointer';
        ar.onclick = () => Parole.prononcer(tour.ar, { rate: Parole.rateSelonLecon(id) });
        b.appendChild(ar);
        b.insertAdjacentHTML('beforeend', (tour.tr ? App.phon(tour.tr) : '') + `<span class="bulle-fr">${tour.fr || ''}</span>`);
        conv.appendChild(b);
      });
      cible.appendChild(conv);
    }

    /* ---- Diapo 1 : introduction ---- */
    {
      const c = nouvelleDiapo('Avant de commencer', null);
      const carte = document.createElement('div'); carte.className = 'cartouche';
      carte.innerHTML = lecon.intro.split('\n').map((t) => `<p>${t}</p>`).join('');
      c.appendChild(carte);
    }

    /* ---- Découverte : un bloc de contenu = une diapo ----
       Les blocs de texte simples qui précèdent un contenu (lettres, lignes,
       dialogue) sont rassemblés en tête de la diapo de ce contenu, pour servir
       d'introduction. Un texte seul (sans contenu après) devient sa propre diapo. */
    if (lecon.decouverte && lecon.decouverte.length) {
      let tampon = [];
      lecon.decouverte.forEach((bloc) => {
        const aContenu = bloc.lettres || bloc.lignes || bloc.dialogue;
        if (bloc.texte && !aContenu) { tampon.push(bloc.texte); return; }
        const c = nouvelleDiapo('Découverte', null);
        tampon.forEach((t) => c.appendChild(elt(`<p>${t}</p>`))); tampon = [];
        if (bloc.texte) c.appendChild(elt(`<p>${bloc.texte}</p>`));
        if (bloc.lettres) rendreLettres(bloc, c);
        if (bloc.lignes) rendreLignes(bloc, c);
        if (bloc.dialogue) rendreDialogue(bloc, c);
      });
      if (tampon.length) { const c = nouvelleDiapo('Découverte', null); tampon.forEach((t) => c.appendChild(elt(`<p>${t}</p>`))); }
    }

    /* ---- Diapo : note grammaticale ---- */
    if (lecon.grammaire) {
      const c = nouvelleDiapo('Note grammaticale', null);
      const note = document.createElement('div'); note.className = 'note-grammaire';
      note.innerHTML = `<h3>${lecon.grammaire.titre}</h3>` +
        lecon.grammaire.corps.split('\n').map((t) => `<p>${t}</p>`).join('');
      c.appendChild(note);
    }

    /* ---- Diapos : pour aller plus loin (une par bloc) ---- */
    if (lecon.approfondissement && lecon.approfondissement.length) {
      lecon.approfondissement.forEach((bloc) => {
        const c = nouvelleDiapo('Pour aller plus loin', null);
        const d = document.createElement('div'); d.className = 'approfondissement';
        d.innerHTML = `<h3>${bloc.titre}</h3>` + bloc.corps.split('\n').map((t) => `<p>${t}</p>`).join('');
        c.appendChild(d);
      });
    }

    /* ---- Diapo : vocabulaire ---- */
    if (lecon.vocabulaire && lecon.vocabulaire.length) {
      const c = nouvelleDiapo('Vocabulaire de la leçon', null);
      const tab = document.createElement('table'); tab.className = 'tableau-voc';
      lecon.vocabulaire.forEach((mot) => {
        const tr = document.createElement('tr');
        tr.innerHTML = `<td class="col-ar">${mot.ar}</td>
          <td class="col-tr">${App.phon(mot.tr)}</td>
          <td class="col-fr">${mot.fr}</td>
          <td class="ic-audio">&#9834;</td>`;
        tr.onclick = () => Parole.prononcer(mot.ar, { rate: Parole.rateSelonLecon(id) });
        tab.appendChild(tr);
      });
      c.appendChild(tab);
    }

    /* ---- Bouton de fin de cours : lancer les exercices ---- */
    const lancer = document.createElement(estIntro ? 'a' : 'button');
    lancer.className = 'btn btn-bloc'; lancer.style.marginTop = '1.6rem';
    if (estIntro) {
      lancer.textContent = 'Commencer la première leçon →';
      lancer.href = 'lecon.html?id=1';
    } else {
      lancer.textContent = 'Commencer les exercices';
      lancer.onclick = () => { montrer('exo'); pousser({ vue: 'exo', idx: 0 }); };
    }

    /* ---- Montage du carrousel ---- */
    const scene = document.createElement('div'); scene.className = 'diapo-scene';
    const elemsDiapo = diapos.map((d, i) => {
      const art = document.createElement('article'); art.className = 'diapo'; art.dataset.i = i;
      art.appendChild(d.corps);
      // La toute dernière diapo accueille le bouton « Commencer les exercices ».
      if (i === diapos.length - 1) {
        const pied = document.createElement('p'); pied.className = 'diapo-fin-note muet petit centre';
        pied.textContent = estIntro ? 'Vous êtes prêt·e à commencer.' : 'C’est le moment de mettre tout cela en pratique.';
        d.corps.appendChild(pied);
        d.corps.appendChild(lancer);
      }
      scene.appendChild(art);
      return art;
    });
    vueCours.appendChild(scene);

    // Barre de navigation (flèches + pastilles de progression).
    const nav = document.createElement('div'); nav.className = 'diapo-nav';
    const prec = document.createElement('button');
    prec.className = 'diapo-fleche'; prec.type = 'button'; prec.innerHTML = '‹';
    prec.setAttribute('aria-label', 'Diapositive précédente');
    const points = document.createElement('div'); points.className = 'diapo-points';
    const pastilles = diapos.map((_, i) => {
      const p = document.createElement('button'); p.className = 'diapo-point'; p.type = 'button';
      p.setAttribute('aria-label', 'Aller à la diapositive ' + (i + 1));
      p.onclick = () => aller(i);
      points.appendChild(p); return p;
    });
    const suiv = document.createElement('button');
    suiv.className = 'diapo-fleche diapo-fleche-suiv'; suiv.type = 'button'; suiv.innerHTML = 'Suivant ›';
    suiv.setAttribute('aria-label', 'Diapositive suivante');
    nav.appendChild(prec); nav.appendChild(points); nav.appendChild(suiv);
    vueCours.appendChild(nav);

    let posDiapo = 0;
    function aller(n) {
      posDiapo = Math.max(0, Math.min(diapos.length - 1, n));
      elemsDiapo.forEach((el, i) => el.classList.toggle('active', i === posDiapo));
      pastilles.forEach((p, i) => {
        p.classList.toggle('actif', i === posDiapo);
        p.classList.toggle('vu', i < posDiapo);
      });
      prec.disabled = posDiapo === 0;
      const dernier = posDiapo === diapos.length - 1;
      suiv.style.visibility = dernier ? 'hidden' : 'visible';
      nav.style.display = diapos.length > 1 ? 'flex' : 'none';
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }
    prec.onclick = () => aller(posDiapo - 1);
    suiv.onclick = () => aller(posDiapo + 1);

    // Clavier : flèches gauche/droite quand le cours est affiché.
    document.addEventListener('keydown', (e) => {
      if (vueCours.style.display === 'none') return;
      if (e.target && /^(INPUT|TEXTAREA|SELECT)$/.test(e.target.tagName)) return;
      if (e.key === 'ArrowRight') aller(posDiapo + 1);
      else if (e.key === 'ArrowLeft') aller(posDiapo - 1);
    });
    // Tactile : balayage horizontal pour changer de diapo.
    let xDebut = null, yDebut = null;
    scene.addEventListener('touchstart', (e) => {
      xDebut = e.changedTouches[0].clientX; yDebut = e.changedTouches[0].clientY;
    }, { passive: true });
    scene.addEventListener('touchend', (e) => {
      if (xDebut === null) return;
      const dx = e.changedTouches[0].clientX - xDebut;
      const dy = e.changedTouches[0].clientY - yDebut;
      if (Math.abs(dx) > 50 && Math.abs(dx) > Math.abs(dy) * 1.4) aller(posDiapo + (dx < 0 ? 1 : -1));
      xDebut = null; yDebut = null;
    }, { passive: true });
    aller(0);

    // Exercices supplémentaires générés à partir du vocabulaire de la leçon,
    // pour densifier l'entraînement. Toujours corrects, car tirés des données.
    function genererSupplementaires(lecon) {
      const voc = (lecon.vocabulaire || []).filter((m) => m.ar && m.tr && m.fr && m.cle);
      if (voc.length < 3) return [];
      const mel = (a) => Exercices.melanger(a);
      const autresQue = (mot, champ, n) => {
        const out = [];
        for (const m of mel(voc)) { if (out.length >= n) break; if (m[champ] !== mot[champ]) out.push(m); }
        return out;
      };
      const sup = [];
      // Appariement de l'ensemble du vocabulaire (jusqu'à 6 paires)
      sup.push({ type: 'appariement', consigne: 'Reliez chaque mot de la leçon à sa traduction.',
        paires: mel(voc).slice(0, 6).map((m) => ({ ar: m.ar, fr: m.fr, cle: m.cle })) });
      // Deux QCM de sens (arabe vers français)
      mel(voc).slice(0, 2).forEach((mot) => {
        const d = autresQue(mot, 'fr', 2);
        if (d.length < 2) return;
        const opts = mel([{ texte: mot.fr, ok: true }, { texte: d[0].fr }, { texte: d[1].fr }]);
        sup.push({ type: 'qcm', consigne: 'Que signifie ce mot ?', enonceAr: mot.ar,
          options: opts.map((o) => ({ texte: o.texte })), bonne: opts.findIndex((o) => o.ok), cles: [mot.cle] });
      });
      // Deux exercices de lecture phonétique (arabe vers transcription)
      mel(voc).slice(0, 2).forEach((mot) => {
        const d = autresQue(mot, 'tr', 2);
        if (d.length < 2) return;
        const opts = mel([{ tr: mot.tr, ok: true }, { tr: d[0].tr }, { tr: d[1].tr }]);
        sup.push({ type: 'phonetique', consigne: 'Lisez ce mot et choisissez sa transcription exacte.',
          motAr: mot.ar, options: opts.map((o) => o.tr), bonne: opts.findIndex((o) => o.ok), cles: [mot.cle] });
      });
      // Densité accrue au-delà du déchiffrage (cycle 2 et plus) :
      // QCM « choisir le mot arabe » + une saisie libre au clavier.
      if ((lecon.cycle || 1) >= 2) {
        mel(voc).slice(0, 2).forEach((mot) => {
          const d = autresQue(mot, 'ar', 2);
          if (d.length < 2) return;
          const opts = mel([{ ar: mot.ar, ok: true }, { ar: d[0].ar }, { ar: d[1].ar }]);
          sup.push({ type: 'qcm', consigne: 'Quel mot correspond à : « ' + mot.fr + ' » ?',
            options: opts.map((o) => ({ ar: o.ar })), bonne: opts.findIndex((o) => o.ok), cles: [mot.cle] });
        });
        mel(voc).slice(0, 1).forEach((mot) => {
          sup.push({ type: 'trou_libre', consigne: 'Écrivez ce mot en arabe, au clavier.',
            segments: [ { reponse: mot.ar } ], traduction: mot.fr, indice: mot.tr, cles: [mot.cle] });
        });
      }
      return sup;
    }

    // On place les jalons de lecture (type 'lecture') tout à la fin, après les
    // exercices générés, pour qu'ils clôturent réellement la leçon (passage de cycle).
    const tousExos = (lecon.exercices || []).concat(genererSupplementaires(lecon));
    const exercices = tousExos.filter((e) => e.type !== 'lecture')
      .concat(tousExos.filter((e) => e.type === 'lecture'));
    const total = exercices.length;
    let repondus = 0, reussis = 0, idx = 0;
    let sessionPoints = 0, combo = 0, meilleurCombo = 0, xpAttribue = false;
    const motsRates = new Set();
    // Rattrapage : on repropose en fin de leçon les exercices manqués, jusqu'à
    // les réussir, pour bien tout ancrer. Une réussite au rattrapage rattrape
    // aussi le score (on peut donc valider la leçon en corrigeant ses erreurs).
    let fileCourante = exercices, totalCourant = total, enRattrapage = false, aRevoir = [];
    // Indices déjà comptabilisés (passe principale) : évite de recompter le
    // score quand on revient sur un exercice via le bouton retour du navigateur.
    const comptes = new Set();
    let naviguePopstate = false;

    function enregistrer(reussi, cles) {
      repondus++;
      if (reussi) reussis++;
      (cles || []).forEach((cle) => {
        Stockage.enregistrerMot(cle, reussi);
        if (!reussi) motsRates.add(cle);
      });
    }

    /* ---- VUE EXERCICES : un par un, façon jeu ---- */
    vueExo.innerHTML = `
      <div class="exo-tete">
        <button class="btn-fantome petit" id="retour-cours">‹ Revoir le cours</button>
        <div class="exo-jauges">
          <span class="exo-combo" id="exo-combo" hidden>✦&nbsp;série&nbsp;<b id="exo-combo-n">0</b></span>
          <span class="exo-pts"><b id="exo-pts">0</b> pts</span>
          <button class="exo-son" id="exo-son" type="button" aria-label="Activer ou couper le son">🔊</button>
        </div>
      </div>
      <span class="exo-compteur" id="exo-compteur"></span>
      <div class="barre-progres-exo"><span id="exo-barre" style="width:0"></span></div>
      <div id="exo-slot"></div>`;

    // Bouton son
    const btnSon = document.getElementById('exo-son');
    function majSon() { btnSon.textContent = Jeu.sonActif() ? '🔊' : '🔇'; btnSon.classList.toggle('muet', !Jeu.sonActif()); }
    majSon();
    btnSon.onclick = () => { Jeu.basculerSon(); majSon(); if (Jeu.sonActif()) Jeu.son('bon'); };

    // Barre de retour « Continuer », créée une fois et fixée en bas
    const barreRetour = document.createElement('div');
    barreRetour.className = 'barre-retour';
    barreRetour.innerHTML = `<div class="barre-retour-in">
      <div class="br-icone" id="br-icone"></div>
      <div class="br-txt"><b id="br-titre"></b><span class="br-sous" id="br-sous"></span></div>
      <button class="btn br-continuer" id="br-continuer" type="button">Continuer</button></div>`;
    document.body.appendChild(barreRetour);
    const brIcone = document.getElementById('br-icone');
    const brTitre = document.getElementById('br-titre');
    const brSous = document.getElementById('br-sous');
    const brContinuer = document.getElementById('br-continuer');
    const encouragements = ['Très bien !', 'Excellent !', 'Parfait !', 'Bravo !', 'Mā shāʾa Llāh !', 'Continuez ainsi !'];

    function cacherRetour() { barreRetour.classList.remove('montre', 'bon', 'moins'); document.body.classList.remove('retour-ouvert'); }
    function montrerBarre(reussi, gain, detailHtml, dernier) {
      barreRetour.classList.remove('bon', 'moins');
      barreRetour.classList.add('montre', reussi ? 'bon' : 'moins');
      document.body.classList.add('retour-ouvert');
      brIcone.textContent = reussi ? '✓' : '✕';
      const enc = reussi ? encouragements[Math.floor(Math.random() * encouragements.length)] : 'Pas tout à fait';
      brTitre.innerHTML = enc + (gain ? ' <span class="br-gain">' + gain + '</span>' : '');
      brSous.innerHTML = detailHtml || (reussi ? '' : 'La bonne réponse est mise en évidence ci-dessus.');
      brContinuer.textContent = dernier ? 'Terminer la leçon' : 'Continuer';
      brContinuer.focus();
    }
    brContinuer.onclick = () => {
      cacherRetour();
      idx++;
      document.getElementById('exo-barre').style.width = Math.round((idx / totalCourant) * 100) + '%';
      afficherExo();
      if (!enRattrapage && idx < totalCourant) pousser({ vue: 'exo', idx });
    };

    function majCombo() {
      const c = document.getElementById('exo-combo');
      if (combo >= 2) {
        c.hidden = false; document.getElementById('exo-combo-n').textContent = combo;
        c.classList.remove('pulse'); void c.offsetWidth; c.classList.add('pulse');
      } else { c.hidden = true; }
    }

    function afficherExo() {
      const slot = document.getElementById('exo-slot');
      cacherRetour();
      if (idx >= totalCourant) { finPasse(); return; }
      slot.innerHTML = '';
      document.getElementById('exo-compteur').textContent =
        (enRattrapage ? 'Rattrapage · ' : '') + 'Exercice ' + (idx + 1) + ' / ' + totalCourant;
      document.getElementById('exo-barre').style.width = Math.round((idx / totalCourant) * 100) + '%';

      const nav = document.createElement('div'); nav.className = 'exo-nav';
      const passer = document.createElement('button');
      passer.className = 'btn-fantome petit'; passer.textContent = 'Passer';
      passer.onclick = () => { idx++; afficherExo(); if (!enRattrapage && idx < totalCourant) pousser({ vue: 'exo', idx }); };
      nav.appendChild(passer);

      let repondu = false;
      Exercices.rendre(fileCourante[idx], idx, slot, (reussi, cles) => {
        if (repondu) return;
        repondu = true;
        const exoCourant = fileCourante[idx];
        // Correction détaillée, déplacée dans la barre (toujours lisible).
        let detail = '';
        const rEl = slot.querySelector('.retour-exo.visible');
        if (rEl) {
          const expl = rEl.querySelector('.expl');
          detail = expl ? expl.innerHTML : (rEl.textContent || '').trim();
          rEl.style.display = 'none';
        }
        // Revisite via le bouton retour : on ne recompte pas, on laisse avancer.
        const cle = 'p-' + idx;
        const premiereFois = enRattrapage || !comptes.has(cle);
        if (!premiereFois) {
          Jeu.son(reussi ? 'bon' : 'moins');
          montrerBarre(reussi, '', detail, (idx === totalCourant - 1) && aRevoir.length === 0);
          passer.style.display = 'none';
          return;
        }
        if (!enRattrapage) {
          comptes.add(cle);
          enregistrer(reussi, cles);
          if (!reussi) aRevoir.push(exoCourant);
        } else {
          // En rattrapage : on alimente la répétition espacée, et une réussite
          // récupère le score (sans dépasser le total) ; sinon on garde l'exo.
          (cles || []).forEach((c) => Stockage.enregistrerMot(c, reussi));
          if (reussi) reussis = Math.min(total, reussis + 1);
          else aRevoir.push(exoCourant);
        }
        const dernier = (idx === totalCourant - 1) && aRevoir.length === 0;
        if (reussi) {
          combo++; meilleurCombo = Math.max(meilleurCombo, combo);
          const bonus = Math.min((combo - 1) * 2, 10);
          const gagne = 10 + bonus;
          sessionPoints += gagne;
          Jeu.compteAnime(document.getElementById('exo-pts'), sessionPoints, '', '', 450);
          majCombo();
          if (combo % 5 === 0) { Jeu.son('serie'); Jeu.confettis({ y: window.innerHeight * 0.35, nombre: 70 }); }
          else { Jeu.son('bon'); }
          montrerBarre(true, '+' + gagne + ' pts' + (bonus ? ' · série ' + combo : ''), detail, dernier);
        } else {
          combo = 0; majCombo();
          Jeu.son('moins');
          montrerBarre(false, '', detail, dernier);
        }
        passer.style.display = 'none';
      }, id);
      slot.appendChild(nav);
    }

    // Fin d'une passe : s'il reste des exercices manqués, on les repropose
    // (rattrapage) ; sinon, on passe au bilan.
    function finPasse() {
      if (aRevoir.length) {
        enRattrapage = true;
        fileCourante = aRevoir;
        aRevoir = [];
        totalCourant = fileCourante.length;
        idx = 0;
        montrerIntroRattrapage(totalCourant);
      } else {
        montrer('bilan');
        pousser({ vue: 'bilan' });
      }
    }

    function montrerIntroRattrapage(n) {
      cacherRetour();
      const slot = document.getElementById('exo-slot');
      slot.innerHTML = '';
      document.getElementById('exo-compteur').textContent = 'Rattrapage';
      document.getElementById('exo-barre').style.width = '0';
      const c = document.createElement('div'); c.className = 'exercice apparait centre';
      c.innerHTML = '<span class="exercice-numero">À revoir</span>' +
        '<h3 style="margin:0.2rem 0 0.4rem;">' + n + ' exercice' + (n > 1 ? 's' : '') + ' à reprendre</h3>' +
        '<p class="muet">Reprenons ce qui a coincé, pour bien tout maîtriser avant de terminer la leçon. ' +
        'Réussir ici rattrape aussi votre score.</p>';
      const wrap = document.createElement('div');
      wrap.style.cssText = 'display:flex;gap:0.6rem;justify-content:center;flex-wrap:wrap;margin-top:1rem;';
      const go = document.createElement('button'); go.className = 'btn'; go.textContent = 'Reprendre ces exercices';
      go.onclick = () => afficherExo();
      const skip = document.createElement('button'); skip.className = 'btn btn-secondaire'; skip.textContent = 'Passer au bilan';
      skip.onclick = () => { aRevoir = []; montrer('bilan'); pousser({ vue: 'bilan' }); };
      wrap.appendChild(go); wrap.appendChild(skip);
      c.appendChild(wrap); slot.appendChild(c);
    }
    document.getElementById('retour-cours').onclick = () => { montrer('cours'); pousser({ vue: 'cours' }); };

    /* ---- VUE BILAN : score, à mémoriser, récapitulatif, navigation ---- */
    const scoreEl = document.createElement('div'); scoreEl.id = 'bilan-score';
    vueBilan.appendChild(scoreEl);

    if (lecon.memoriser) {
      const m = section('À mémoriser');
      const bloc = document.createElement('div'); bloc.className = 'a-memoriser';
      bloc.innerHTML = `<div class="ornement">۞</div>
        <div class="ar">${lecon.memoriser.ar}</div>
        <div class="tr-phon">${App.phon(lecon.memoriser.tr)}</div>
        <div class="fr">${lecon.memoriser.fr}</div>`;
      const b = audioBtn(lecon.memoriser.ar); b.style.marginTop = '0.6rem';
      bloc.appendChild(b); m.appendChild(bloc);
      if (lecon.memoriser.construction) {
        const c = document.createElement('div'); c.className = 'note-grammaire'; c.style.marginTop = '1rem';
        c.innerHTML = '<h3>Comment cette phrase est construite</h3>' +
          lecon.memoriser.construction.split('\n').map((t) => `<p>${t}</p>`).join('');
        m.appendChild(c);
      }
      const cle = lecon.memoriser.cle || ('phrase-' + id);
      const wrap = document.createElement('div'); wrap.className = 'centre'; wrap.style.marginTop = '1rem';
      const bm = document.createElement('button'); bm.className = 'btn btn-secondaire btn-petit'; bm.type = 'button';
      bm.textContent = 'Je veux retenir cette phrase';
      bm.onclick = () => { Stockage.enregistrerPhrase(cle, true); bm.textContent = 'Phrase ajoutée à vos rappels'; bm.disabled = true; };
      wrap.appendChild(bm); m.appendChild(wrap);
      vueBilan.appendChild(m);
    }

    if (lecon.recap && lecon.recap.length) {
      const r = section('Récapitulatif');
      const ul = document.createElement('ul'); ul.className = 'recap';
      lecon.recap.forEach((pt) => { const li = document.createElement('li'); li.innerHTML = pt; ul.appendChild(li); });
      r.appendChild(ul);
      vueBilan.appendChild(r);
    }

    const pied = document.createElement('div'); pied.className = 'pied-lecon';
    const lienSuivant = id < 30 ? `lecon.html?id=${id+1}` : 'progression.html';
    const txtSuivant = id < 30 ? `Leçon ${App.romain(id+1)}` : 'Voir mon bilan';
    pied.innerHTML = `
      <button class="btn-secondaire btn" id="refaire">Refaire les exercices</button>
      <a class="btn" href="${lienSuivant}">${txtSuivant}</a>`;
    vueBilan.appendChild(pied);

    function majBilan() {
      const seuil = Math.ceil(total * 0.8);
      const acquis = reussis >= seuil;
      if (acquis) Stockage.enregistrerScoreLecon(id, reussis, total);

      // Récompense en points (XP), une seule fois, à la complétion réelle de la série
      let info = Stockage.niveau();
      let monteNiveau = false;
      if (repondus >= total && !xpAttribue) {
        const avant = Stockage.niveau().niveau;
        info = Stockage.ajouterPartie(sessionPoints, meilleurCombo);
        monteNiveau = info.niveau > avant;
        xpAttribue = true;
      }

      const taux = total ? reussis / total : 0;
      const nbEtoiles = taux >= 0.9 ? 3 : (taux >= 0.6 ? 2 : 1);
      const etoilesHtml = '★★★'.split('').map((c, i) => i < nbEtoiles ? '★' : '<span class="vide">☆</span>').join('');
      const phrase = acquis
        ? (nbEtoiles === 3 ? 'Sans faute ou presque, mā shāʾa Llāh.' : 'Leçon acquise, bārak Allāhu fīk. Vos mots rejoignent la révision.')
        : `Encore ${seuil - reussis} réussite${(seuil - reussis) > 1 ? 's' : ''} pour valider la leçon. Reprenez les exercices, tout doucement.`;

      scoreEl.innerHTML = `<div class="bilan-jeu apparait">
        <div class="jeu-etoiles">${etoilesHtml}</div>
        <div class="grand-pts" id="bilan-grand">0 / ${total}</div>
        <p class="${acquis ? 'bilan-ok' : 'muet'}">${phrase}</p>
        <p class="muet petit">+<span id="bilan-xp">0</span> points${meilleurCombo >= 2 ? ' · meilleure série ' + meilleurCombo : ''}</p>
        ${monteNiveau
          ? `<p style="color:var(--accent);font-weight:600;font-size:1.1rem">Vous passez au niveau ${info.niveau} !</p>`
          : `<p class="muet petit">Niveau ${info.niveau} · ${info.dansNiveau}/${info.pourNiveau} points vers le suivant</p>`}
      </div>`;

      const elScore = document.getElementById('bilan-grand');
      if (Jeu.reduit()) { elScore.textContent = reussis + ' / ' + total; }
      else {
        const t0 = performance.now();
        (function pas(t) {
          const p = Math.min(1, (t - t0) / 700);
          const v = Math.round(reussis * (0.5 - Math.cos(p * Math.PI) / 2));
          elScore.textContent = v + ' / ' + total;
          if (p < 1) requestAnimationFrame(pas);
        })(t0);
      }
      Jeu.compteAnime(document.getElementById('bilan-xp'), sessionPoints, '', '', 800);
      if (acquis) { Jeu.son('fin'); Jeu.confettis({ nombre: 130, y: window.innerHeight * 0.3 }); }
    }
    document.getElementById('refaire').onclick = () => {
      idx = 0; repondus = 0; reussis = 0; sessionPoints = 0; combo = 0; meilleurCombo = 0; xpAttribue = false;
      fileCourante = exercices; totalCourant = total; enRattrapage = false; aRevoir = [];
      comptes.clear();
      document.getElementById('exo-pts').textContent = '0';
      document.getElementById('exo-combo').hidden = true;
      montrer('exo');
      pousser({ vue: 'exo', idx: 0 });
    };

    /* ---- Aiguillage des vues ---- */
    function montrer(quoi) {
      if (quoi !== 'exo') cacherRetour();
      if (window.FondParallax) { quoi === 'exo' ? FondParallax.masquer() : FondParallax.afficher(); }
      vueCours.style.display = quoi === 'cours' ? 'block' : 'none';
      vueExo.style.display = quoi === 'exo' ? 'block' : 'none';
      vueBilan.style.display = quoi === 'bilan' ? 'block' : 'none';
      document.querySelectorAll('.onglet').forEach((o) => o.classList.toggle('actif', o.dataset.vue === quoi));
      if (quoi === 'exo') afficherExo();
      if (quoi === 'bilan') majBilan();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }
    document.querySelectorAll('.onglet').forEach((o) => { o.onclick = () => { montrer(o.dataset.vue); pousser({ vue: o.dataset.vue, idx }); }; });

    /* ---- Bouton retour du navigateur : revenir d'une étape, pas quitter ---- */
    function pousser(etat) {
      if (naviguePopstate) return;
      try { history.pushState({ lecon: id, ...etat }, ''); } catch (e) {}
    }
    try { history.replaceState({ lecon: id, vue: 'cours' }, ''); } catch (e) {}
    window.addEventListener('popstate', (e) => {
      const st = e.state;
      // État hors de notre pile (ou base) : on laisse le navigateur quitter la leçon.
      if (!st || st.lecon !== id) return;
      naviguePopstate = true;
      if (st.vue === 'exo') {
        if (!enRattrapage && typeof st.idx === 'number') idx = st.idx;
        montrer('exo');
      } else if (st.vue === 'bilan') {
        montrer('bilan');
      } else {
        montrer('cours');
      }
      naviguePopstate = false;
    });

    montrer('cours');
  </script>
  <!-- Synchronisation de la progression (Firebase, si connecté) -->
  <script src="js/firebase-config.js"></script>
  <script type="module" src="js/sync.js"></script>
  <script src="js/fond-parallax.js"></script>
</body>
</html>
